groups:
  - name: kbeacon.agent
    interval: 30s
    rules:
      - alert: KBeaconAgentDown
        expr: up{job=~"kbeacon.*"} == 0
        for: 2m
        labels:
          severity: critical
          component: kbeacon
        annotations:
          summary: "KBeacon Agent is down"
          description: "KBeacon target {{ $labels.instance }} in cluster {{ $labels.cluster }} has been down for more than 2 minutes."
          runbook_url: "https://memoliyasti.github.io/kbeacon/operator-guide/runbooks/#kbeaconagentdown"

      - alert: KBeaconCacheNotSynced
        expr: min by (cluster, instance, resource) (kbeacon_cache_sync_status{job=~"kbeacon.*"}) == 0
        for: 5m
        labels:
          severity: warning
          component: kbeacon
        annotations:
          summary: "KBeacon cache is not synced"
          description: "KBeacon cache for resource {{ $labels.resource }} in cluster {{ $labels.cluster }} has not synced for more than 5 minutes."
          runbook_url: "https://memoliyasti.github.io/kbeacon/operator-guide/runbooks/#kbeaconcachenotsynced"

      - alert: KBeaconGraphRebuildLatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (cluster, instance, le) (
              rate(kbeacon_graph_update_duration_seconds_bucket{job=~"kbeacon.*"}[5m])
            )
          ) > 2
        for: 10m
        labels:
          severity: warning
          component: kbeacon
        annotations:
          summary: "KBeacon graph rebuild latency is high"
          description: "KBeacon graph rebuild p95 latency is above 2s for cluster {{ $labels.cluster }}."
          runbook_url: "https://memoliyasti.github.io/kbeacon/operator-guide/runbooks/#kbeacongraphrebuildlatencyhigh"

  - name: kbeacon.dependencies
    interval: 30s
    rules:
      - alert: KBeaconSecretChangedWithImpact
        expr: |
          (
            time() - kbeacon_secret_last_changed_timestamp_seconds{job=~"kbeacon.*"}
          ) < 900
          and on (cluster, namespace, secret_name)
          kbeacon_secret_affected_workload_count{job=~"kbeacon.*"} > 0
        for: 2m
        labels:
          severity: warning
          component: kbeacon
        annotations:
          summary: "Secret changed and affects workloads"
          description: "Secret {{ $labels.namespace }}/{{ $labels.secret_name }} changed recently and affects workloads in cluster {{ $labels.cluster }}."
          runbook_url: "https://memoliyasti.github.io/kbeacon/operator-guide/runbooks/#kbeaconsecretchangedwithimpact"

      - alert: KBeaconCriticalSecretChangedRecently
        expr: |
          (
            (
              time() - kbeacon_secret_last_changed_timestamp_seconds{job=~"kbeacon.*"}
            ) < 900
          )
          * on (cluster, namespace, secret_name) group_left(owner_team, criticality)
          (
            kbeacon_secret_info{job=~"kbeacon.*",criticality=~"high|critical"} == 1
          )
          and on (cluster, namespace, secret_name)
          (
            kbeacon_secret_affected_workload_count{job=~"kbeacon.*"} > 0
          )
        for: 1m
        labels:
          severity: critical
          component: kbeacon
        annotations:
          summary: "Critical or high Secret changed recently"
          description: "Secret {{ $labels.namespace }}/{{ $labels.secret_name }} with criticality {{ $labels.criticality }} changed recently and affects workloads in cluster {{ $labels.cluster }}."
          runbook_url: "https://memoliyasti.github.io/kbeacon/operator-guide/runbooks/#kbeaconcriticalsecretchangedrecently"

      - alert: KBeaconHighImpactSecret
        expr: kbeacon_secret_impact_score{job=~"kbeacon.*"} >= 80
        for: 5m
        labels:
          severity: warning
          component: kbeacon
        annotations:
          summary: "High impact Kubernetes Secret"
          description: "Secret {{ $labels.namespace }}/{{ $labels.secret_name }} in cluster {{ $labels.cluster }} has impact score {{ $value }}."
          runbook_url: "https://memoliyasti.github.io/kbeacon/operator-guide/runbooks/#kbeaconhighimpactsecret"

      - alert: KBeaconLargeSecretFanout
        expr: kbeacon_secret_affected_workload_count{job=~"kbeacon.*"} >= 20
        for: 10m
        labels:
          severity: warning
          component: kbeacon
        annotations:
          summary: "Secret has large workload fan-out"
          description: "Secret {{ $labels.namespace }}/{{ $labels.secret_name }} affects {{ $value }} workloads in cluster {{ $labels.cluster }}."
          runbook_url: "https://memoliyasti.github.io/kbeacon/operator-guide/runbooks/#kbeaconlargesecretfanout"

      - alert: KBeaconUnresolvedSecretReference
        expr: kbeacon_unresolved_secret_references{job=~"kbeacon.*"} > 0
        for: 5m
        labels:
          severity: warning
          component: kbeacon
        annotations:
          summary: "Unresolved Secret reference detected"
          description: "Secret reference {{ $labels.namespace }}/{{ $labels.secret_name }} is unresolved in cluster {{ $labels.cluster }}."
          runbook_url: "https://memoliyasti.github.io/kbeacon/operator-guide/runbooks/#kbeaconunresolvedsecretreference"

      - alert: KBeaconNoDependenciesDiscovered
        expr: |
          kbeacon_cluster_workload_count{job=~"kbeacon.*"} > 0
          and on (cluster, instance)
          kbeacon_cluster_dependency_count{job=~"kbeacon.*"} == 0
        for: 15m
        labels:
          severity: info
          component: kbeacon
        annotations:
          summary: "No Secret dependencies discovered"
          description: "KBeacon sees workloads in cluster {{ $labels.cluster }} but no Secret dependencies have been discovered for 15 minutes."
          runbook_url: "https://memoliyasti.github.io/kbeacon/operator-guide/runbooks/#kbeaconnodependenciesdiscovered"

  - name: kbeacon.recording
    interval: 30s
    rules:
      - record: kbeacon:secret_impact_score:max_by_cluster
        expr: max by (cluster) (kbeacon_secret_impact_score{job=~"kbeacon.*"})

      - record: kbeacon:secret_changes:increase_1h
        expr: |
          sum by (cluster, namespace, secret_name) (
            increase(kbeacon_secret_changes_total{job=~"kbeacon.*"}[1h])
          )

      - record: kbeacon:secret_changes:increase_24h
        expr: |
          sum by (cluster, namespace, secret_name) (
            increase(kbeacon_secret_changes_total{job=~"kbeacon.*"}[24h])
          )

      - record: kbeacon:secret_age_since_change_seconds
        expr: |
          min by (cluster, namespace, secret_name) (
            time() - kbeacon_secret_last_changed_timestamp_seconds{job=~"kbeacon.*"}
          )

      - record: kbeacon:recently_changed_affected_secrets
        expr: |
          max by (cluster, namespace, secret_name, owner_team, criticality, exists) (
            kbeacon_secret_affected_workload_count{job=~"kbeacon.*"} > 0
          )
          and on (cluster, namespace, secret_name)
          (
            min by (cluster, namespace, secret_name) (
              time() - kbeacon_secret_last_changed_timestamp_seconds{job=~"kbeacon.*"}
            ) < 3600
          )

      - record: kbeacon:dependency_edges:sum_by_cluster
        expr: sum by (cluster) (kbeacon_cluster_dependency_count{job=~"kbeacon.*"})

      - record: kbeacon:dependency_edges:sum_by_workload_namespace
        expr: |
          sum by (cluster, workload_namespace) (
            kbeacon_dependency_edges{job=~"kbeacon.*"}
          )

      - record: kbeacon:dependency_edges:sum_by_secret_namespace
        expr: |
          sum by (cluster, secret_namespace) (
            kbeacon_dependency_edges{job=~"kbeacon.*"}
          )

      - record: kbeacon:dependency_edges:sum_by_owner_team
        expr: |
          sum by (cluster, owner_team) (
            kbeacon_dependency_edges{job=~"kbeacon.*"}
          )

      - record: kbeacon:dependency_edges:sum_by_discovery_mode
        expr: |
          sum by (cluster, discovery_mode, resolved) (
            kbeacon_dependency_edges{job=~"kbeacon.*"}
          )

      - record: kbeacon:dependency_edges:changes_1h
        expr: |
          sum by (cluster) (
            changes(kbeacon_cluster_dependency_count{job=~"kbeacon.*"}[1h])
          )

      - record: kbeacon:dependency_edges:net_delta_1h
        expr: |
          sum by (cluster) (
            delta(kbeacon_cluster_dependency_count{job=~"kbeacon.*"}[1h])
          )

      - record: kbeacon:watch_events:rate5m
        expr: |
          sum by (cluster, resource, event) (
            rate(kbeacon_kubernetes_watch_events_total{job=~"kbeacon.*"}[5m])
          )

      - record: kbeacon:graph_update_duration:p95_5m
        expr: |
          histogram_quantile(
            0.95,
            sum by (cluster, le) (
              rate(kbeacon_graph_update_duration_seconds_bucket{job=~"kbeacon.*"}[5m])
            )
          )
