apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api
  namespace: payments
  labels:
    app.kubernetes.io/name: payments
    app.kubernetes.io/team: payments-platform
    app.kubernetes.io/environment: demo
    priority: critical
  annotations:
    kbeacon.io/enabled: "true"
    kbeacon.io/discovery-mode: hybrid
    kbeacon.io/watch-secrets: "shared/platform-ca,payments/legacy-payment-token"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: payments-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: payments-api
    spec:
      containers:
        - name: api
          image: busybox:1.36
          command: ["sh", "-c", "sleep 3600"]
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: payments-db
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payments-db
                  key: password
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-worker
  namespace: payments
  labels:
    app.kubernetes.io/name: checkout
    app.kubernetes.io/team: checkout
    app.kubernetes.io/environment: demo
    priority: high
  annotations:
    kbeacon.io/enabled: "true"
    kbeacon.io/discovery-mode: infer
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: checkout-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: checkout-worker
    spec:
      containers:
        - name: worker
          image: busybox:1.36
          command: ["sh", "-c", "sleep 3600"]
          envFrom:
            - secretRef:
                name: payments-db
          env:
            - name: STRIPE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: stripe-api
                  key: token
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reports-api
  namespace: reports
  labels:
    app.kubernetes.io/name: reports
    app.kubernetes.io/team: data-platform
    app.kubernetes.io/environment: demo
    priority: medium
  annotations:
    kbeacon.io/enabled: "true"
    kbeacon.io/discovery-mode: explicit
    kbeacon.io/watch-secrets: "payments/payments-db,shared/platform-ca"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: reports-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: reports-api
    spec:
      containers:
        - name: api
          image: busybox:1.36
          command: ["sh", "-c", "sleep 3600"]
