apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api
  namespace: payments
  annotations:
    kbeacon.io/enabled: "true"
    kbeacon.io/discovery-mode: hybrid
    kbeacon.io/owner-team: payments-platform
    kbeacon.io/service: payments
    kbeacon.io/environment: demo
    kbeacon.io/criticality: critical
    kbeacon.io/watch-secrets: "shared/platform-ca,payments/legacy-payment-token"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: payments-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: payments-api
    spec:
      containers:
        - name: api
          image: busybox:1.36
          command: ["sh", "-c", "sleep 3600"]
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: payments-db
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payments-db
                  key: password
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-worker
  namespace: payments
  annotations:
    kbeacon.io/enabled: "true"
    kbeacon.io/discovery-mode: infer
    kbeacon.io/owner-team: checkout
    kbeacon.io/service: checkout
    kbeacon.io/environment: demo
    kbeacon.io/criticality: high
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: checkout-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: checkout-worker
    spec:
      containers:
        - name: worker
          image: busybox:1.36
          command: ["sh", "-c", "sleep 3600"]
          envFrom:
            - secretRef:
                name: payments-db
          env:
            - name: STRIPE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: stripe-api
                  key: token
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reports-api
  namespace: reports
  annotations:
    kbeacon.io/enabled: "true"
    kbeacon.io/discovery-mode: explicit
    kbeacon.io/owner-team: data-platform
    kbeacon.io/service: reports
    kbeacon.io/environment: demo
    kbeacon.io/criticality: medium
    kbeacon.io/watch-secrets: "payments/payments-db,shared/platform-ca"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: reports-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: reports-api
    spec:
      containers:
        - name: api
          image: busybox:1.36
          command: ["sh", "-c", "sleep 3600"]
