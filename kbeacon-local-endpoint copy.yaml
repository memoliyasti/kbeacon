apiVersion: v1
kind: Service
metadata:
  name: kbeacon-local
  namespace: kube-addons
  labels:
    app: kbeacon
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Endpoints
metadata:
  name: kbeacon-local
  namespace: kube-addons
subsets:
  - addresses:
      - ip: 192.168.65.254
    ports:
      - name: http
        port: 8080
