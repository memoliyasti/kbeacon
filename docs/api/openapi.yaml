openapi: 3.1.0
info:
  title: KBeacon Agent API
  version: 0.2.4
  description: Read-only API for Kubernetes Secret dependency intelligence.
servers:
  - url: http://kbeacon.kbeacon-system.svc:8080

paths:
  /healthz:
    get:
      summary: Liveness endpoint
      operationId: getHealthz
      responses:
        "200":
          description: Agent is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /readyz:
    get:
      summary: Readiness endpoint
      operationId: getReadyz
      responses:
        "200":
          description: Agent is ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
        "503":
          description: Agent is not ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"

  /api/v1:
    get:
      summary: API discovery
      operationId: getApiDiscovery
      responses:
        "200":
          description: Discovery document.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoveryResponse"

  /api/v1/config:
    get:
      summary: Get current Agent graph summary
      operationId: getConfigSummary
      responses:
        "200":
          description: Current graph summary.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ConfigSummary"

  /api/v1/secrets:
    get:
      summary: List observed and referenced Secrets
      operationId: listSecrets
      parameters:
        - $ref: "#/components/parameters/Namespace"
        - $ref: "#/components/parameters/OwnerTeam"
        - $ref: "#/components/parameters/Criticality"
        - $ref: "#/components/parameters/Exists"
        - $ref: "#/components/parameters/SecretName"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Secret list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/SecretSummary"
        default:
          $ref: "#/components/responses/Error"

  /api/v1/workloads:
    get:
      summary: List normalized workloads
      operationId: listWorkloads
      parameters:
        - $ref: "#/components/parameters/Namespace"
        - $ref: "#/components/parameters/OwnerTeam"
        - $ref: "#/components/parameters/Criticality"
        - $ref: "#/components/parameters/WorkloadKind"
        - $ref: "#/components/parameters/WorkloadName"
        - $ref: "#/components/parameters/DiscoveryModeQuery"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Workload list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/WorkloadSummary"
        default:
          $ref: "#/components/responses/Error"

  /api/v1/dependency-map:
    get:
      summary: Get current dependency graph
      operationId: getDependencyMap
      parameters:
        - $ref: "#/components/parameters/Namespace"
        - $ref: "#/components/parameters/WorkloadNamespace"
        - $ref: "#/components/parameters/SecretNamespace"
        - $ref: "#/components/parameters/WorkloadKind"
        - $ref: "#/components/parameters/WorkloadName"
        - $ref: "#/components/parameters/SecretName"
        - $ref: "#/components/parameters/OwnerTeam"
        - $ref: "#/components/parameters/Criticality"
        - $ref: "#/components/parameters/Resolved"
        - $ref: "#/components/parameters/DiscoveryModeQuery"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Dependency map.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/DependencyMap"
        default:
          $ref: "#/components/responses/Error"

  /api/v1/secrets/{namespace}/{name}/impact:
    get:
      summary: Get Secret impact
      operationId: getSecretImpact
      parameters:
        - $ref: "#/components/parameters/PathNamespace"
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Secret impact details.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SecretImpact"
        "404":
          $ref: "#/components/responses/Error"

  /api/v1/workloads/{namespace}/{name}/dependencies:
    get:
      summary: Get workload dependencies by namespace and name
      description: This lookup is useful when workload names are unique in a namespace. If multiple kinds share the same name, use the kind-qualified endpoint.
      operationId: getWorkloadDependenciesByName
      parameters:
        - $ref: "#/components/parameters/PathNamespace"
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Workload dependencies.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/WorkloadDependencies"
        "404":
          $ref: "#/components/responses/Error"

  /api/v1/workloads/{namespace}/{kind}/{name}/dependencies:
    get:
      summary: Get workload dependencies by namespace, kind, and name
      operationId: getWorkloadDependenciesByKind
      parameters:
        - $ref: "#/components/parameters/PathNamespace"
        - name: kind
          in: path
          required: true
          schema:
            type: string
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Workload dependencies.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/WorkloadDependencies"
        "404":
          $ref: "#/components/responses/Error"

components:
  parameters:
    Namespace:
      name: namespace
      in: query
      schema:
        type: string
      description: Exact namespace filter.
    OwnerTeam:
      name: ownerTeam
      in: query
      schema:
        type: string
      description: Exact owner team filter.
    Criticality:
      name: criticality
      in: query
      schema:
        type: string
        enum:
          - unknown
          - low
          - medium
          - high
          - critical
      description: Exact criticality filter.
    Exists:
      name: exists
      in: query
      schema:
        type: boolean
      description: Exact Secret existence filter. Unresolved or unobservable references use false.
    Resolved:
      name: resolved
      in: query
      schema:
        type: boolean
      description: Exact dependency edge resolution filter.
    SecretName:
      name: secretName
      in: query
      schema:
        type: string
      description: Exact Secret name filter.
    WorkloadName:
      name: workloadName
      in: query
      schema:
        type: string
      description: Exact workload name filter.
    WorkloadKind:
      name: workloadKind
      in: query
      schema:
        type: string
      description: Case-insensitive workload kind filter, for example Deployment.
    WorkloadNamespace:
      name: workloadNamespace
      in: query
      schema:
        type: string
      description: Exact workload namespace filter for dependency-map edges.
    SecretNamespace:
      name: secretNamespace
      in: query
      schema:
        type: string
      description: Exact Secret namespace filter for dependency-map edges.
    DiscoveryModeQuery:
      name: discoveryMode
      in: query
      schema:
        $ref: "#/components/schemas/DiscoveryMode"
      description: Exact discovery mode filter.
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        default: 100
        maximum: 1000
      description: Maximum items or edges to return. Values above 1000 are capped to 1000.
    Offset:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
      description: Zero-based result offset.

  responses:
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok

    ReadyResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - ready
            - not ready
        cluster:
          type: string
        caches:
          type: array
          items:
            type: object
            properties:
              resource:
                type: string
              synced:
                type: boolean
              optional:
                type: boolean
              reason:
                type: string
            additionalProperties: true

    DiscoveryResponse:
      type: object
      properties:
        apiVersion:
          type: string
          example: kbeacon.io/v1
        cluster:
          type: string
        resources:
          type: array
          items:
            type: string
          example:
            - secrets
            - workloads
            - dependency-map
            - config

    Envelope:
      type: object
      properties:
        apiVersion:
          type: string
          example: kbeacon.io/v1
        cluster:
          type: string
        generatedAt:
          type: string
          format: date-time
        pagination:
          $ref: "#/components/schemas/Pagination"
        data: {}

    Pagination:
      type: object
      properties:
        limit:
          type: integer
        offset:
          type: integer
        total:
          type: integer
        returned:
          type: integer
        nextOffset:
          type: integer
      additionalProperties: false

    ErrorEnvelope:
      type: object
      properties:
        apiVersion:
          type: string
          example: kbeacon.io/v1
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string

    ConfigSummary:
      type: object
      properties:
        cluster:
          type: object
          properties:
            name:
              type: string
        graph:
          type: object
          properties:
            secrets:
              type: integer
            workloads:
              type: integer
            edges:
              type: integer

    SecretRef:
      type: object
      properties:
        cluster:
          type: string
        namespace:
          type: string
        name:
          type: string
        key:
          type: string
          description: Optional key component for explicit references. Edge-level graph records normalize this away today.

    WorkloadRef:
      type: object
      properties:
        cluster:
          type: string
        namespace:
          type: string
        apiVersion:
          type: string
        kind:
          type: string
        name:
          type: string
        uid:
          type: string

    DiscoveryMode:
      type: string
      enum:
        - infer
        - explicit
        - hybrid
        - disabled

    DependencySource:
      type: object
      properties:
        type:
          type: string
          examples:
            - env.secretKeyRef
            - envFrom.secretRef
            - volumes.secret
            - imagePullSecrets
            - serviceAccount.imagePullSecrets
            - ingress.tls
            - annotation
        path:
          type: string
        container:
          type: string
        initContainer:
          type: string
        ephemeralContainer:
          type: boolean
        volume:
          type: string
        envVar:
          type: string
        annotation:
          type: string
        resourceField:
          type: string
      additionalProperties: false

    DependencyEdge:
      type: object
      properties:
        id:
          type: string
        cluster:
          type: string
        workload:
          $ref: "#/components/schemas/WorkloadRef"
        secret:
          $ref: "#/components/schemas/SecretRef"
        discoveryMode:
          $ref: "#/components/schemas/DiscoveryMode"
        sources:
          type: array
          items:
            $ref: "#/components/schemas/DependencySource"
        optional:
          type: boolean
        resolved:
          type: boolean
        ownerTeam:
          type: string
        criticality:
          type: string
        purpose:
          type: string
        firstObservedAt:
          type: string
          format: date-time
        lastObservedAt:
          type: string
          format: date-time

    SecretSummary:
      type: object
      properties:
        ref:
          $ref: "#/components/schemas/SecretRef"
        exists:
          type: boolean
        type:
          type: string
        ownerTeam:
          type: string
        criticality:
          type: string
        lastObservedChangeTime:
          type: string
          format: date-time
        observedChangeCount:
          type: integer
          format: uint64
        affectedWorkloadCount:
          type: integer
        affectedTeamCount:
          type: integer
        affectedNamespaceCount:
          type: integer
        unresolvedReferenceCount:
          type: integer
        impactScore:
          type: number
          format: double

    WorkloadSummary:
      type: object
      properties:
        ref:
          $ref: "#/components/schemas/WorkloadRef"
        ownerTeam:
          type: string
        service:
          type: string
        environment:
          type: string
        criticality:
          type: string
        discoveryMode:
          $ref: "#/components/schemas/DiscoveryMode"
        dependencyCount:
          type: integer
        unresolvedCount:
          type: integer

    DependencyMapNode:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum:
            - workload
            - secret
        label:
          type: string
        ref:
          oneOf:
            - $ref: "#/components/schemas/WorkloadRef"
            - $ref: "#/components/schemas/SecretRef"
        ownerTeam:
          type: string
        criticality:
          type: string
        impactScore:
          type: number
          format: double

    DependencyMap:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/DependencyMapNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/DependencyEdge"

    AffectedTeam:
      type: object
      properties:
        ownerTeam:
          type: string
        workloadCount:
          type: integer

    SecretImpactSummary:
      type: object
      properties:
        affectedWorkloadCount:
          type: integer
        affectedTeamCount:
          type: integer
        affectedNamespaceCount:
          type: integer
        unresolvedReferenceCount:
          type: integer
        discoveryModes:
          type: object
          additionalProperties:
            type: integer

    SecretImpact:
      type: object
      properties:
        secret:
          $ref: "#/components/schemas/SecretSummary"
        summary:
          $ref: "#/components/schemas/SecretImpactSummary"
        affectedTeams:
          type: array
          items:
            $ref: "#/components/schemas/AffectedTeam"
        affectedWorkloads:
          type: array
          items:
            $ref: "#/components/schemas/WorkloadSummary"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/DependencyEdge"

    WorkloadDependency:
      type: object
      properties:
        secret:
          $ref: "#/components/schemas/SecretSummary"
        discoveryMode:
          $ref: "#/components/schemas/DiscoveryMode"
        resolved:
          type: boolean
        optional:
          type: boolean
        sources:
          type: array
          items:
            $ref: "#/components/schemas/DependencySource"

    WorkloadDependencies:
      type: object
      properties:
        workload:
          $ref: "#/components/schemas/WorkloadSummary"
        dependencies:
          type: array
          items:
            $ref: "#/components/schemas/WorkloadDependency"
