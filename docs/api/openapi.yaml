
openapi: 3.1.0
info:
  title: KBeacon Agent API
  version: 0.1.2
  description: Read-only API for Kubernetes Secret dependency intelligence.
servers:
  - url: http://kbeacon.kbeacon-system.svc:8080

paths:
  /healthz:
    get:
      summary: Liveness endpoint
      operationId: getHealthz
      responses:
        "200":
          description: Agent is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /readyz:
    get:
      summary: Readiness endpoint
      operationId: getReadyz
      responses:
        "200":
          description: Agent is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
        "503":
          description: Agent is not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"

  /api/v1:
    get:
      summary: API discovery
      operationId: getApiDiscovery
      responses:
        "200":
          description: Discovery document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoveryResponse"

  /api/v1/config:
    get:
      summary: Get current Agent graph summary
      operationId: getConfigSummary
      responses:
        "200":
          description: Current graph summary
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ConfigSummary"

  /api/v1/secrets:
    get:
      summary: List observed and referenced Secrets
      operationId: listSecrets
      parameters:
        - $ref: "#/components/parameters/Namespace"
        - $ref: "#/components/parameters/OwnerTeam"
        - $ref: "#/components/parameters/Criticality"
      responses:
        "200":
          description: Secret list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/SecretSummary"
        default:
          $ref: "#/components/responses/Error"

  /api/v1/workloads:
    get:
      summary: List normalized workloads
      operationId: listWorkloads
      parameters:
        - $ref: "#/components/parameters/Namespace"
        - $ref: "#/components/parameters/OwnerTeam"
        - $ref: "#/components/parameters/Criticality"
        - name: workloadKind
          in: query
          schema:
            type: string
          description: Case-insensitive workload kind filter, for example Deployment.
      responses:
        "200":
          description: Workload list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/WorkloadSummary"
        default:
          $ref: "#/components/responses/Error"

  /api/v1/dependency-map:
    get:
      summary: Get current dependency graph
      operationId: getDependencyMap
      responses:
        "200":
          description: Dependency map
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/DependencyMap"
        default:
          $ref: "#/components/responses/Error"

  /api/v1/secrets/{namespace}/{name}/impact:
    get:
      summary: Get Secret impact
      operationId: getSecretImpact
      parameters:
        - $ref: "#/components/parameters/PathNamespace"
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Secret impact details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SecretImpact"
        "404":
          $ref: "#/components/responses/Error"

  /api/v1/workloads/{namespace}/{name}/dependencies:
    get:
      summary: Get workload dependencies by namespace and name
      operationId: getWorkloadDependenciesByName
      parameters:
        - $ref: "#/components/parameters/PathNamespace"
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Workload dependencies
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/WorkloadDependencies"
        "404":
          $ref: "#/components/responses/Error"

  /api/v1/workloads/{namespace}/{kind}/{name}/dependencies:
    get:
      summary: Get workload dependencies by namespace, kind, and name
      operationId: getWorkloadDependenciesByKind
      parameters:
        - $ref: "#/components/parameters/PathNamespace"
        - name: kind
          in: path
          required: true
          schema:
            type: string
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Workload dependencies
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/WorkloadDependencies"
        "404":
          $ref: "#/components/responses/Error"

components:
  parameters:
    Namespace:
      name: namespace
      in: query
      schema:
        type: string
    OwnerTeam:
      name: ownerTeam
      in: query
      schema:
        type: string
    Criticality:
      name: criticality
      in: query
      schema:
        type: string
        enum:
          - unknown
          - low
          - medium
          - high
          - critical
    PathNamespace:
      name: namespace
      in: path
      required: true
      schema:
        type: string

  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok

    ReadyResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - ready
            - not ready
        cluster:
          type: string
        caches:
          type: array
          items:
            type: object
            additionalProperties: true

    DiscoveryResponse:
      type: object
      properties:
        apiVersion:
          type: string
          example: kbeacon.io/v1
        cluster:
          type: string
        resources:
          type: array
          items:
            type: string

    Envelope:
      type: object
      properties:
        apiVersion:
          type: string
          example: kbeacon.io/v1
        cluster:
          type: string
        generatedAt:
          type: string
          format: date-time
        data: {}

    ErrorEnvelope:
      type: object
      properties:
        apiVersion:
          type: string
          example: kbeacon.io/v1
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string

    ConfigSummary:
      type: object
      properties:
        cluster:
          type: object
          properties:
            name:
              type: string
        graph:
          type: object
          properties:
            secrets:
              type: integer
            workloads:
              type: integer
            edges:
              type: integer

    ObjectRef:
      type: object
      properties:
        cluster:
          type: string
        namespace:
          type: string
        name:
          type: string

    WorkloadRef:
      type: object
      properties:
        cluster:
          type: string
        namespace:
          type: string
        apiVersion:
          type: string
        kind:
          type: string
        name:
          type: string
        uid:
          type: string

    SecretSummary:
      type: object
      properties:
        ref:
          $ref: "#/components/schemas/ObjectRef"
        exists:
          type: boolean
        type:
          type: string
        ownerTeam:
          type: string
        criticality:
          type: string
        lastObservedChangeTime:
          type: string
          format: date-time
        observedChangeCount:
          type: integer
        affectedWorkloadCount:
          type: integer
        affectedTeamCount:
          type: integer
        affectedNamespaceCount:
          type: integer
        unresolvedReferenceCount:
          type: integer
        impactScore:
          type: number

    WorkloadSummary:
      type: object
      properties:
        ref:
          $ref: "#/components/schemas/WorkloadRef"
        ownerTeam:
          type: string
        criticality:
          type: string
        discoveryMode:
          type: string
        dependencyCount:
          type: integer
        unresolvedCount:
          type: integer

    DependencySource:
      type: object
      additionalProperties: true

    DependencyEdge:
      type: object
      properties:
        id:
          type: string
        cluster:
          type: string
        workload:
          $ref: "#/components/schemas/WorkloadRef"
        secret:
          $ref: "#/components/schemas/ObjectRef"
        discoveryMode:
          type: string
        sources:
          type: array
          items:
            $ref: "#/components/schemas/DependencySource"
        optional:
          type: boolean
        resolved:
          type: boolean
        ownerTeam:
          type: string
        criticality:
          type: string
        firstObservedAt:
          type: string
          format: date-time
        lastObservedAt:
          type: string
          format: date-time

    DependencyMap:
      type: object
      properties:
        secrets:
          type: array
          items:
            $ref: "#/components/schemas/SecretSummary"
        workloads:
          type: array
          items:
            $ref: "#/components/schemas/WorkloadSummary"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/DependencyEdge"

    SecretImpact:
      type: object
      properties:
        secret:
          $ref: "#/components/schemas/SecretSummary"
        workloads:
          type: array
          items:
            $ref: "#/components/schemas/WorkloadSummary"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/DependencyEdge"

    WorkloadDependencies:
      type: object
      properties:
        workload:
          $ref: "#/components/schemas/WorkloadSummary"
        secrets:
          type: array
          items:
            $ref: "#/components/schemas/SecretSummary"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/DependencyEdge"
