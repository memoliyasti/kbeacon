# Example Prometheus scrape configuration for KBeacon.
#
# Use this when you are not using Prometheus Operator ServiceMonitor.
# For local Minikube development, see:
#
#   hack/local-dev/prometheus-kbeacon-incluster-values.yaml

scrape_configs:
  # Recommended in-cluster scrape target.
  - job_name: kbeacon-agent
    honor_labels: true
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - kbeacon.kbeacon-system.svc.cluster.local:8080
        labels:
          cluster: minikube
          app: kbeacon
          component: agent
          environment: local
          deployment_mode: in-cluster

  # Alternative Kubernetes service-discovery form.
  #
  # - job_name: kbeacon-agent-sd
  #   honor_labels: true
  #   metrics_path: /metrics
  #   kubernetes_sd_configs:
  #     - role: endpoints
  #       namespaces:
  #         names:
  #           - kbeacon-system
  #   relabel_configs:
  #     - source_labels: [__meta_kubernetes_service_label_app_kubernetes_io_name]
  #       regex: kbeacon
  #       action: keep
  #     - source_labels: [__meta_kubernetes_endpoint_port_name]
  #       regex: http
  #       action: keep
  #     - target_label: cluster
  #       replacement: minikube
  #     - target_label: app
  #       replacement: kbeacon
  #     - target_label: component
  #       replacement: agent
  #     - target_label: deployment_mode
  #       replacement: in-cluster

  # Alternative local-process development target.
  #
  # Use this only when running ./bin/kbeacon-agent on the host and exposing it
  # through hack/local-dev/create-kbeacon-local-endpoint.sh.
  #
  # - job_name: kbeacon-local
  #   honor_labels: true
  #   metrics_path: /metrics
  #   scrape_interval: 5s
  #   scrape_timeout: 3s
  #   static_configs:
