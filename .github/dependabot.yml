version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:15"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 5
    groups:
      kubernetes:
        patterns:
          - "k8s.io/*"
      prometheus:
        patterns:
          - "github.com/prometheus/*"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:30"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 5
