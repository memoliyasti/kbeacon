name: pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "examples/**"
      - "hack/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - ".github/workflows/pages.yaml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: build and deploy site
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install documentation dependencies
        run: python -m pip install -r requirements-docs.txt

      - name: Build site
        run: mkdocs build --strict

      - name: Verify Helm repository static files
        run: |
          test -s site/charts/index.yaml
          test -s site/charts/artifacthub-repo.yml
          grep -q "name: kbeacon" site/charts/index.yaml
          grep -q "version: 0.3.0" site/charts/index.yaml
          grep -q "kbeacon-0.3.0.tgz" site/charts/index.yaml
          grep -q "owners:" site/charts/artifacthub-repo.yml

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5
