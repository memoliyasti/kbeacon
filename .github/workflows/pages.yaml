name: pages

on:
  push:
    branches:
      - main
    paths:
      - mkdocs.yml
      - requirements-docs.txt
      - docs/**
      - README.md
      - CONTRIBUTING.md
      - CODE_OF_CONDUCT.md
      - SECURITY.md
      - SUPPORT.md
      - GOVERNANCE.md
      - MAINTAINERS.md
      - RELEASE.md
      - ROADMAP.md
      - ADOPTERS.md
      - .github/workflows/pages.yaml
  pull_request:
    paths:
      - mkdocs.yml
      - requirements-docs.txt
      - docs/**
      - README.md
      - CONTRIBUTING.md
      - CODE_OF_CONDUCT.md
      - SECURITY.md
      - SUPPORT.md
      - GOVERNANCE.md
      - MAINTAINERS.md
      - RELEASE.md
      - ROADMAP.md
      - ADOPTERS.md
      - .github/workflows/pages.yaml
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install docs dependencies
        run: python -m pip install -r requirements-docs.txt

      - name: Build docs
        run: mkdocs build --strict

      - name: Configure GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    name: deploy docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
