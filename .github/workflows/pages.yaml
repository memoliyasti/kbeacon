name: pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "examples/**"
      - "hack/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - "README.md"
      - "CONTRIBUTING.md"
      - "CODE_OF_CONDUCT.md"
      - "SECURITY.md"
      - ".github/workflows/pages.yaml"

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-publish:
    name: build and publish gh-pages branch
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install documentation dependencies
        run: python -m pip install -r requirements-docs.txt

      - name: Build site
        run: mkdocs build --strict

      - name: Verify Helm repository static files
        run: |
          test -s site/charts/index.yaml
          test -s site/charts/artifacthub-repo.yml
          grep -q "name: kbeacon" site/charts/index.yaml
          grep -q "version: 0.3.0" site/charts/index.yaml
          grep -q "kbeacon-0.3.0.tgz" site/charts/index.yaml
          grep -q "owners:" site/charts/artifacthub-repo.yml

      - name: Disable Jekyll processing
        run: touch site/.nojekyll

      - name: Publish site to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          cd site

          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "Deploy documentation and Helm repository"

          git branch -M gh-pages
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
