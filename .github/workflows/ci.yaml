name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - feat/**
      - release/**

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/kbeacon-agent

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Download Go modules
        run: go mod download

      - name: Check gofmt
        run: |
          UNFORMATTED="$(git ls-files -z '*.go' | xargs -0 -r gofmt -l)"
          if [ -n "${UNFORMATTED}" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "${UNFORMATTED}"
            exit 1
          fi

      - name: Run tests
        run: go test ./...

      - name: Build agent
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=ci -X main.commit=${GITHUB_SHA}" \
            -o ./bin/kbeacon-agent \
            ./cmd/kbeacon-agent

      - name: Helm lint
        run: helm lint ./charts/kbeacon --set cluster.name=ci

      - name: Helm template
        run: |
          helm template kbeacon ./charts/kbeacon \
            --namespace kbeacon-system \
            --set cluster.name=ci \
            --set dashboards.enabled=true \
            > /tmp/kbeacon-rendered.yaml

      - name: Check Prometheus rules
        run: |
          docker run --rm -i \
            --entrypoint=promtool \
            prom/prometheus:v3.1.0 \
            check rules /dev/stdin < examples/prometheus/rules.yaml

  docker-smoke:
    name: docker smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name != 'push' || github.ref != 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          build-args: |
            VERSION=ci
            COMMIT=${{ github.sha }}
          cache-from: type=gha,scope=kbeacon-ci-amd64
          cache-to: type=gha,mode=max,scope=kbeacon-ci-amd64
          tags: kbeacon-agent:ci

      - name: Container help smoke
        run: docker run --rm kbeacon-agent:ci --help

  publish-main-image:
    name: publish main image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=main
            COMMIT=${{ github.sha }}
          cache-from: type=gha,scope=kbeacon-main-amd64
          cache-to: type=gha,mode=max,scope=kbeacon-main-amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
