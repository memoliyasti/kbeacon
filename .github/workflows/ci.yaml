name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - feat/**
      - release/**
    paths-ignore:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - '*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/CODEOWNERS'
      - '.github/dependabot.yml'
      - '.github/workflows/pages.yaml'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Download Go modules
        run: go mod download

      - name: Check gofmt
        run: |
          UNFORMATTED="$(git ls-files -z '*.go' | xargs -0 -r gofmt -l)"
          if [ -n "${UNFORMATTED}" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "${UNFORMATTED}"
            exit 1
          fi

      - name: Run tests
        run: go test ./...

      - name: Build agent
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=ci -X main.commit=${GITHUB_SHA}" \
            -o ./bin/kbeacon-agent \
            ./cmd/kbeacon-agent

      - name: Helm lint
        run: helm lint ./charts/kbeacon --set cluster.name=ci

      - name: Helm template
        run: |
          helm template kbeacon ./charts/kbeacon \
            --namespace kbeacon-system \
            --set cluster.name=ci \
            --set dashboards.enabled=true \
            > /tmp/kbeacon-rendered.yaml

      - name: Helm template low-privilege
        run: |
          helm template kbeacon ./charts/kbeacon \
            --namespace kbeacon-system \
            --set cluster.name=ci \
            --set resourcesToWatch.core.secrets=false \
            > /tmp/kbeacon-low-privilege-rendered.yaml
          if grep -n 'resources: \["secrets"\]' /tmp/kbeacon-low-privilege-rendered.yaml; then
            echo "low-privilege render unexpectedly contains Secret RBAC"
            exit 1
          fi
          grep -n 'secrets: false' /tmp/kbeacon-low-privilege-rendered.yaml

      - name: Helm template edge-disabled metrics
        run: |
          helm template kbeacon ./charts/kbeacon \
            --namespace kbeacon-system \
            --set cluster.name=ci \
            --set metrics.edge.enabled=false \
            > /tmp/kbeacon-edge-disabled-rendered.yaml
          grep -n 'edge:' /tmp/kbeacon-edge-disabled-rendered.yaml
          grep -n 'enabled: false' /tmp/kbeacon-edge-disabled-rendered.yaml

      - name: Helm template namespace-scoped
        run: |
          helm template kbeacon ./charts/kbeacon \
            --namespace payments \
            --set cluster.name=ci \
            --set rbac.scope=namespace \
            --set discovery.namespaces.include={payments} \
            > /tmp/kbeacon-namespace-rendered.yaml

          grep -q "kind: Role" /tmp/kbeacon-namespace-rendered.yaml
          if grep -q "kind: ClusterRole" /tmp/kbeacon-namespace-rendered.yaml; then
            echo "namespace-scoped render unexpectedly contains ClusterRole"
            exit 1
          fi

      - name: Check Prometheus rules
        run: |
          docker run --rm -i \
            --entrypoint=promtool \
            prom/prometheus:v3.1.0 \
            check rules /dev/stdin < examples/prometheus/rules.yaml

      - name: Run extended validation targets
        run: make helm-template-low-privilege helm-template-edge-disabled helm-template-namespace docs demo-lint scale-lint stale-check release-metadata-check

  docker-smoke:
    name: docker smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name != 'push' || github.ref != 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          build-args: |
            VERSION=ci
            COMMIT=${{ github.sha }}
          cache-from: type=gha,scope=kbeacon-ci-amd64
          cache-to: type=gha,mode=max,scope=kbeacon-ci-amd64
          tags: kbeacon-agent:ci

      - name: Container help smoke
        run: docker run --rm kbeacon-agent:ci --help

  publish-main-image:
    name: publish main image
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Linux release binaries
        run: |
          set -euo pipefail
          mkdir -p dist

          VERSION="main"
          COMMIT="${GITHUB_SHA}"

          build() {
            local goos="$1"
            local goarch="$2"
            local output="dist/kbeacon-agent_${VERSION}_${goos}_${goarch}"

            echo "Building ${output}"
            GOOS="${goos}" GOARCH="${goarch}" CGO_ENABLED=0 \
              go build \
                -trimpath \
                -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT}" \
                -o "${output}" \
                ./cmd/kbeacon-agent
          }

          pids=()

          build linux amd64 &
          pids+=("$!")

          build linux arm64 &
          pids+=("$!")

          for pid in "${pids[@]}"; do
            wait "${pid}"
          done

          ls -lh dist/

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=main
          cache-from: type=gha,scope=kbeacon-main-image
          cache-to: type=gha,mode=max,scope=kbeacon-main-image
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
