name: e2e-kind

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'charts/**'
      - 'hack/e2e-kind-smoke.sh'
      - 'Makefile'
      - 'hack/e2e-kind-certmanager-smoke.sh'
      - '.github/workflows/e2e-kind.yaml'
      - 'Dockerfile'
      - 'go.mod'
      - 'go.sum'
  push:
    branches:
      - main
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'charts/**'
      - 'hack/e2e-kind-smoke.sh'
      - 'Makefile'
      - 'hack/e2e-kind-certmanager-smoke.sh'
      - '.github/workflows/e2e-kind.yaml'
      - 'Dockerfile'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: read

concurrency:
  group: e2e-kind-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kind-smoke:
    name: kind smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      KIND_VERSION: v0.24.0
      KBEACON_E2E_CLUSTER: kbeacon-e2e

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Kind
        run: |
          set -euo pipefail
          curl -fsSLo kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          chmod +x kind
          sudo mv kind /usr/local/bin/kind
          kind version

      - name: Run Kind E2E smoke
        run: make kind-e2e-smoke

      - name: Run cert-manager Certificate Kind smoke
        run: make kind-e2e-certmanager-smoke
