name: e2e-kind

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/e2e-kind.yaml"
      - "hack/e2e-kind-smoke.sh"
      - "hack/e2e-kind-certmanager-smoke.sh"
      - "hack/e2e-kind-externalsecret-smoke.sh"
      - "hack/e2e-kind-secretproviderclass-smoke.sh"
      - "hack/e2e-kind-kafka-connectors-smoke.sh"
      - "hack/e2e-kind-replicaset-owner-resolution-smoke.sh"
      - "charts/kbeacon/**"
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - "Dockerfile.release"
      - "Makefile"
  pull_request:
    paths:
      - ".github/workflows/e2e-kind.yaml"
      - "hack/e2e-kind-smoke.sh"
      - "hack/e2e-kind-certmanager-smoke.sh"
      - "hack/e2e-kind-externalsecret-smoke.sh"
      - "hack/e2e-kind-secretproviderclass-smoke.sh"
      - "hack/e2e-kind-kafka-connectors-smoke.sh"
      - "hack/e2e-kind-replicaset-owner-resolution-smoke.sh"
      - "charts/kbeacon/**"
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - "Dockerfile.release"
      - "Makefile"

permissions:
  contents: read

concurrency:
  group: e2e-kind-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kind-smoke:
    name: kind smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Kind
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/kind https://kind.sigs.k8s.io/dl/v0.30.0/kind-linux-amd64
          chmod +x /tmp/kind
          sudo mv /tmp/kind /usr/local/bin/kind
          kind version

      - name: Run Kind E2E smoke
        run: ./hack/e2e-kind-smoke.sh

      - name: Run cert-manager Certificate Kind smoke
        run: ./hack/e2e-kind-certmanager-smoke.sh

      - name: Run ExternalSecret Kind smoke
        run: ./hack/e2e-kind-externalsecret-smoke.sh

      - name: Run SecretProviderClass Kind smoke
        run: ./hack/e2e-kind-secretproviderclass-smoke.sh

      - name: Run Kafka connector Kind smoke
        run: ./hack/e2e-kind-kafka-connectors-smoke.sh

      - name: Run ReplicaSet owner-resolution Kind smoke
        run: ./hack/e2e-kind-replicaset-owner-resolution-smoke.sh
