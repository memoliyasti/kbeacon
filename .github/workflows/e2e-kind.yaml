name: e2e-kind

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'charts/**'
      - 'hack/e2e-kind-smoke.sh'
      - 'Makefile'
      - 'hack/e2e-kind-certmanager-smoke.sh'
      - 'hack/e2e-kind-externalsecret-smoke.sh'
      - 'hack/e2e-kind-secretproviderclass-smoke.sh'
      - '.github/workflows/e2e-kind.yaml'
      - 'Dockerfile'
      - 'go.mod'
      - 'go.sum'
  push:
    branches:
      - main
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'charts/**'
      - 'hack/e2e-kind-smoke.sh'
      - 'Makefile'
      - 'hack/e2e-kind-certmanager-smoke.sh'
      - 'hack/e2e-kind-externalsecret-smoke.sh'
      - 'hack/e2e-kind-secretproviderclass-smoke.sh'
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Kind
        run: |
          set -euo pipefail
          curl -fsSLo kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          chmod +x kind
          sudo mv kind /usr/local/bin/kind
          kind version

      - name: Run Kind E2E smoke
        run: make kind-e2e-smoke

      - name: Run cert-manager Certificate Kind smoke
        run: make kind-e2e-certmanager-smoke

      - name: Run ExternalSecret Kind smoke
        run: make kind-e2e-externalsecret-smoke

      - name: Run SecretProviderClass Kind smoke
        run: make kind-e2e-secretproviderclass-smoke

      - name: Run Kafka connector Kind smoke
        run: ./hack/e2e-kind-kafka-connectors-smoke.sh
