name: e2e-kind

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Kind E2E profile to run
        type: choice
        default: core
        options:
          - core
          - full
  schedule:
    - cron: "37 2 * * 1"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/e2e-kind.yaml"
      - "hack/e2e-kind-smoke.sh"
      - "hack/e2e-kind-certmanager-smoke.sh"
      - "hack/e2e-kind-externalsecret-smoke.sh"
      - "hack/e2e-kind-secretproviderclass-smoke.sh"
      - "hack/e2e-kind-kafka-connectors-smoke.sh"
      - "hack/e2e-kind-replicaset-owner-resolution-smoke.sh"
      - "charts/kbeacon/**"
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - "Dockerfile.release"
      - "Makefile"
  pull_request:
    paths:
      - ".github/workflows/e2e-kind.yaml"
      - "hack/e2e-kind-smoke.sh"
      - "hack/e2e-kind-certmanager-smoke.sh"
      - "hack/e2e-kind-externalsecret-smoke.sh"
      - "hack/e2e-kind-secretproviderclass-smoke.sh"
      - "hack/e2e-kind-kafka-connectors-smoke.sh"
      - "hack/e2e-kind-replicaset-owner-resolution-smoke.sh"
      - "charts/kbeacon/**"
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - "Dockerfile.release"
      - "Makefile"

permissions:
  contents: read

concurrency:
  group: e2e-kind-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kind-core:
    name: kind core smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install Kind
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/kind https://kind.sigs.k8s.io/dl/v0.30.0/kind-linux-amd64
          chmod +x /tmp/kind
          sudo mv /tmp/kind /usr/local/bin/kind
          kind version

      - name: Run Kind core smoke
        run: ./hack/e2e-kind-smoke.sh

  kind-full:
    name: kind full optional smoke
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs:
      - kind-core
    if: github.event_name == 'push' || github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'full')

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install Kind
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/kind https://kind.sigs.k8s.io/dl/v0.30.0/kind-linux-amd64
          chmod +x /tmp/kind
          sudo mv /tmp/kind /usr/local/bin/kind
          kind version

      - name: Run cert-manager Certificate Kind smoke
        run: ./hack/e2e-kind-certmanager-smoke.sh

      - name: Run ExternalSecret Kind smoke
        run: ./hack/e2e-kind-externalsecret-smoke.sh

      - name: Run SecretProviderClass Kind smoke
        run: ./hack/e2e-kind-secretproviderclass-smoke.sh

      - name: Run Kafka connector Kind smoke
        run: ./hack/e2e-kind-kafka-connectors-smoke.sh

      - name: Run ReplicaSet owner-resolution Kind smoke
        run: ./hack/e2e-kind-replicaset-owner-resolution-smoke.sh
