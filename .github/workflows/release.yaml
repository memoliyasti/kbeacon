name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME}"
          VERSION_NO_V="${VERSION#v}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "version_no_v=${VERSION_NO_V}" >> "${GITHUB_OUTPUT}"

      - name: Check gofmt
        run: |
          UNFORMATTED="$(git ls-files -z '*.go' | xargs -0 -r gofmt -l)"
          if [ -n "${UNFORMATTED}" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "${UNFORMATTED}"
            exit 1
          fi

      - name: Run tests
        run: go test ./...

      - name: Helm lint
        run: helm lint ./charts/kbeacon --set cluster.name=release

      - name: Helm template
        run: |
          helm template kbeacon ./charts/kbeacon \
            --namespace kbeacon-system \
            --set cluster.name=release \
            --set dashboards.enabled=true \
            > /tmp/kbeacon-rendered.yaml

      - name: Check Prometheus rules
        run: |
          docker run --rm -i \
            --entrypoint=promtool \
            prom/prometheus:v3.1.0 \
            check rules /dev/stdin < examples/prometheus/rules.yaml

      - name: Build release binaries
        run: |
          set -euo pipefail
          mkdir -p dist

          VERSION="${{ steps.version.outputs.version }}"
          COMMIT="${GITHUB_SHA}"

          build() {
            local goos="$1"
            local goarch="$2"
            local ext="$3"
            local output="dist/kbeacon-agent_${VERSION}_${goos}_${goarch}${ext}"

            echo "Building ${output}"
            GOOS="${goos}" GOARCH="${goarch}" CGO_ENABLED=0 \
              go build \
                -trimpath \
                -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT}" \
                -o "${output}" \
                ./cmd/kbeacon-agent
          }

          pids=()

          build linux amd64 "" &
          pids+=("$!")

          build linux arm64 "" &
          pids+=("$!")

          build darwin amd64 "" &
          pids+=("$!")

          build darwin arm64 "" &
          pids+=("$!")


          for pid in "${pids[@]}"; do
            wait "${pid}"
          done

      - name: Package Helm chart
        run: |
          helm package ./charts/kbeacon \
            --destination dist \
            --version "${{ steps.version.outputs.version_no_v }}" \
            --app-version "${{ steps.version.outputs.version_no_v }}"

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.version_no_v }}
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push release image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=kbeacon-release-image
          cache-to: type=gha,mode=max,scope=kbeacon-release-image
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*
          generate_release_notes: true
