name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME}"
          VERSION_NO_V="${VERSION#v}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "version_no_v=${VERSION_NO_V}" >> "${GITHUB_OUTPUT}"

      - name: Check gofmt
        run: |
          UNFORMATTED="$(git ls-files -z '*.go' | xargs -0 -r gofmt -l)"
          if [ -n "${UNFORMATTED}" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "${UNFORMATTED}"
            exit 1
          fi

      - name: Run tests
        run: go test ./...

      - name: Run release validation targets
        run: make ctl-smoke supply-chain-lint supported-resources-lint runbooks-lint kind-e2e-smoke-lint kind-e2e-kafka-connectors-smoke-lint kind-e2e-replicaset-owner-resolution-smoke-lint api-contract-lint helm-schema-lint helm-template helm-template-low-privilege helm-template-serviceaccount-disabled helm-template-ingress-disabled helm-template-certmanager helm-template-externalsecret helm-template-secretproviderclass helm-template-strimzi-kafkaconnector helm-template-confluent-connector helm-template-replicaset-owner-resolution helm-template-networkpolicy helm-template-privacy-redaction helm-template-edge-disabled helm-template-prometheus-annotations helm-template-namespace prom-rules docs dashboards-lint demo-lint scale-lint stale-check no-secret-leak-test release-metadata-check release-consistency-lint

      - name: Build release binaries
        run: |
          set -euo pipefail
          mkdir -p dist

          VERSION="${{ steps.version.outputs.version }}"
          COMMIT="${GITHUB_SHA}"

          build() {
            local component="$1"
            local package="$2"
            local goos="$3"
            local goarch="$4"
            local ext="$5"
            local output="dist/${component}_${VERSION}_${goos}_${goarch}${ext}"

            echo "Building ${output}"
            GOOS="${goos}" GOARCH="${goarch}" CGO_ENABLED=0 \
              go build \
                -trimpath \
                -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT}" \
                -o "${output}" \
                "${package}"
          }

          build_all() {
            local component="$1"
            local package="$2"

            build "${component}" "${package}" linux amd64 "" &
            pids+=("$!")

            build "${component}" "${package}" linux arm64 "" &
            pids+=("$!")

            build "${component}" "${package}" darwin amd64 "" &
            pids+=("$!")

            build "${component}" "${package}" darwin arm64 "" &
            pids+=("$!")
          }

          pids=()

          build_all "kbeacon-agent" "./cmd/kbeacon-agent"
          build_all "kbeacon" "./cmd/kbeaconctl"
          build_all "kbeaconctl" "./cmd/kbeaconctl"

          for pid in "${pids[@]}"; do
            wait "${pid}"
          done

          ls -lh dist/

      - name: Prepare Helm signing key
        run: |
          set -euo pipefail
          mkdir -p .helm-signing
          printf "%s" "${{ secrets.HELM_SIGNING_KEYRING_BASE64 }}" | base64 -d > .helm-signing/secring.gpg
          printf "%s" "${{ secrets.HELM_SIGNING_PASSPHRASE }}" > .helm-signing/passphrase.txt
          gpg --batch --yes --dearmor --output .helm-signing/pubring.gpg docs/charts/kbeacon-helm-signing-key.asc
          chmod 600 .helm-signing/secring.gpg .helm-signing/passphrase.txt .helm-signing/pubring.gpg

      - name: Package Helm chart
        run: |
          helm package ./charts/kbeacon \
            --destination dist \
            --version "${{ steps.version.outputs.version_no_v }}" \
            --app-version "${{ steps.version.outputs.version_no_v }}" \
            --sign \
            --key "${{ secrets.HELM_SIGNING_KEY_NAME }}" \
            --keyring .helm-signing/secring.gpg \
            --passphrase-file .helm-signing/passphrase.txt

      - name: Verify Helm chart provenance
        run: |
          helm verify "dist/kbeacon-${{ steps.version.outputs.version_no_v }}.tgz" \
            --keyring .helm-signing/pubring.gpg

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate release SBOMs
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.version }}"
          VERSION_NO_V="${{ steps.version.outputs.version_no_v }}"

          syft dir:.             --exclude './dist/**'             --exclude './site/**'             --exclude './.venv/**'             --exclude './.venv-docs/**'             -o spdx-json="dist/kbeacon-source-${VERSION}.spdx.json"

          for artifact in dist/kbeacon-agent_${VERSION}_* dist/kbeacon_${VERSION}_* dist/kbeaconctl_${VERSION}_* dist/kbeacon-${VERSION_NO_V}.tgz
          do
            if [ -f "${artifact}" ]; then
              syft "file:${artifact}" -o spdx-json="${artifact}.spdx.json"
            fi
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.version_no_v }}
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push release image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=kbeacon-release-image
          cache-to: type=gha,mode=max,scope=kbeacon-release-image
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign and verify release image
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          IMAGE_REF="${IMAGE_NAME}@${IMAGE_DIGEST}"
          IDENTITY="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release.yaml@${GITHUB_REF}"
          cosign sign --yes "${IMAGE_REF}"
          cosign verify \
            --certificate-identity "${IDENTITY}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${IMAGE_REF}"

      - name: Attest release artifact provenance
        uses: actions/attest@v4
        with:
          subject-checksums: dist/checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*
          generate_release_notes: true
