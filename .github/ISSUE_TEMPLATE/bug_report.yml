name: Bug report
description: Report a reproducible KBeacon bug.
title: "[bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug. Please include enough detail for maintainers to reproduce it.
  - type: input
    id: version
    attributes:
      label: KBeacon version
      placeholder: v0.1.2 or main sha
    validations:
      required: true
  - type: input
    id: kubernetes
    attributes:
      label: Kubernetes version
      placeholder: v1.29.0
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      render: shell
