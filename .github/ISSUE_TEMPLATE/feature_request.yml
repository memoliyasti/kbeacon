name: Feature request
description: Suggest a new KBeacon capability.
title: "[feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or operator problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the desired behavior.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: principles
    attributes:
      label: Project principles
      options:
        - label: This does not require exporting Secret values.
        - label: This keeps Kubernetes access read-only.
        - label: This avoids unbounded Prometheus labels.
