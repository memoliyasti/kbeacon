name: Documentation issue
description: Report missing, unclear, or incorrect documentation.
title: "[docs]: "
labels:
  - documentation
body:
  - type: input
    id: page
    attributes:
      label: Page or file
      placeholder: docs/reference/metrics.md
  - type: textarea
    id: issue
    attributes:
      label: What should be improved?
    validations:
      required: true
