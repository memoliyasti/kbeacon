{{- if .Values.config.create }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kbeacon.configMapName" . }}
  labels:
    {{- include "kbeacon.labels" . | nindent 4 }}
data:
  config.yaml: |
    apiVersion: kbeacon.io/v1alpha1
    kind: AgentConfig
    cluster:
      name: {{ required "cluster.name is required" .Values.cluster.name | quote }}
      environment: {{ .Values.cluster.environment | quote }}
      region: {{ .Values.cluster.region | quote }}
    log:
      level: {{ .Values.log.level | quote }}
      format: {{ .Values.log.format | quote }}
      includeSecretNames: {{ .Values.log.includeSecretNames }}
    agent:
      http:
        port: {{ .Values.agent.http.port }}
        metricsPath: {{ .Values.agent.http.metricsPath | quote }}
      shutdownGracePeriod: {{ .Values.agent.shutdownGracePeriod | quote }}
    api:
      enabled: {{ .Values.api.enabled }}
      defaultLimit: {{ .Values.api.defaultLimit }}
      maxLimit: {{ .Values.api.maxLimit }}
      maxResponseBytes: {{ .Values.api.maxResponseBytes }}
      includeRawEdges: {{ .Values.api.includeRawEdges }}
      includeSafeAnnotations: {{ .Values.api.includeSafeAnnotations }}
    discovery:
{{ toYaml .Values.discovery | indent 6 }}
    resourcesToWatch:
{{ toYaml .Values.resourcesToWatch | indent 6 }}
    secretObservation:
{{ toYaml .Values.secretObservation | indent 6 }}
    impact:
{{ toYaml .Values.impact | indent 6 }}
    metrics:
{{ toYaml .Values.metrics | indent 6 }}
{{- end }}
