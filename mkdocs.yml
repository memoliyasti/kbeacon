site_name: KBeacon
site_description: Kubernetes-native Secret Dependency Intelligence for Prometheus, Grafana, and Mimir.
site_url: https://memoliyasti.github.io/kbeacon/
repo_url: https://github.com/memoliyasti/kbeacon
repo_name: memoliyasti/kbeacon
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

plugins:
  - search

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Overview: index.md
  - Concepts:
      - Why KBeacon: concepts/why-kbeacon.md
  - Getting started: getting-started.md
  - User guide:
      - Installation: user-guide/installation.md
      - Configuration: user-guide/configuration.md
      - Discovery modes: user-guide/discovery-modes.md
      - Blast-radius demo: user-guide/blast-radius-demo.md
      - Scale testing: user-guide/scale-testing.md
      - Dashboards: user-guide/dashboards.md
      - Alerting: user-guide/alerting.md
  - Operator guide:
      - Releases: operator-guide/releases.md
      - Security: operator-guide/security.md
  - Operations:
      - Prometheus: operations/prometheus.md
  - Reference:
      - Helm: reference/helm.md
      - Metrics: reference/metrics.md
      - Annotations: reference/annotations.md
  - Developer guide:
      - Architecture: developer-guide/architecture.md
      - API: developer-guide/api.md
  - API:
      - Agent API: api/index.md
  - Design:
      - Technical design: technical-design.md
  - Community:
      - Governance: community/governance.md
      - Maintainers: community/maintainers.md
      - Adopters: community/adopters.md
      - Roadmap: community/roadmap.md
      - Contributing: community/contributing.md
      - Security: community/security.md
      - Support: community/support.md
      - Code of Conduct: community/code-of-conduct.md
