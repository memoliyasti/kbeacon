site_name: KBeacon
site_description: Kubernetes-native Secret Dependency Intelligence for Prometheus, Grafana, and Mimir.
site_url: https://memoliyasti.github.io/kbeacon/
repo_url: https://github.com/memoliyasti/kbeacon
repo_name: memoliyasti/kbeacon
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Getting started:
      - Quickstart: getting-started.md
      - Installation: user-guide/installation.md
      - Configuration: user-guide/configuration.md
      - Dashboards: user-guide/dashboards.md
      - Alerting: user-guide/alerting.md
  - Operator guide:
      - Security model: operator-guide/security.md
      - Releases: operator-guide/releases.md
      - Helm reference: reference/helm.md
      - Metrics reference: reference/metrics.md
      - Annotation reference: reference/annotations.md
  - Developer guide:
      - Architecture: developer-guide/architecture.md
      - API: developer-guide/api.md
      - Technical design: technical-design.md
      - Contributing: community/contributing.md
  - Community:
      - Governance: community/governance.md
      - Code of Conduct: community/code-of-conduct.md
      - Support: community/support.md
      - Maintainers: community/maintainers.md
      - Roadmap: community/roadmap.md
      - Adopters: community/adopters.md
