nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/memoliyasti/kbeacon
  tag: "0.1.2"
  digest: ""
  pullPolicy: IfNotPresent

replicaCount: 1

imagePullSecrets: []

cluster:
  name: ""
  environment: ""
  region: ""

log:
  level: info
  format: json
  includeSecretNames: false

config:
  create: true
  existingConfigMap: ""

agent:
  http:
    port: 8080
    metricsPath: /metrics
  shutdownGracePeriod: 15s

api:
  enabled: true
  defaultLimit: 100
  maxLimit: 1000
  maxResponseBytes: 10485760
  includeRawEdges: false
  includeSafeAnnotations: true

health:
  livenessPath: /healthz
  readinessPath: /readyz

discovery:
  defaultMode: hybrid
  includeImagePullSecrets: true
  includeInitContainers: true
  includeEphemeralContainers: true
  readPodTemplateAnnotations: true
  namespaceAnnotations:
    enabled: true
  ownerResolution:
    enabled: true
    preferController: true
    includeReplicaSets: false
    includePodsControlledByWorkloads: false
  namespaces:
    include: []
    exclude:
      - kube-system
      - kube-public
      - kube-node-lease
  resyncInterval: 10h
  reconcile:
    debounce: 250ms
    workers: 2
    rateLimiter:
      baseDelay: 5ms
      maxDelay: 30s
      maxRetries: 5

resourcesToWatch:
  core:
    secrets: true
    pods: true
  apps:
    deployments: true
    statefulSets: true
    daemonSets: true
    replicaSets: false
  batch:
    jobs: true
    cronJobs: true
  strimzi:
    kafkaConnectors: false
    required: false
    parseConfigProviderReferences: false
  confluent:
    connectors: false
    required: false
    inferMountedSecrets: false
    mountedSecretPathPrefixes:
      - /mnt/secrets

secretObservation:
  mode: metadata
  treatEveryUpdateAsChange: true
  exposeSecretType: true

impact:
  recentChangeWindow: 15m
  criticalityWeights:
    unknown: 0
    low: 2
    medium: 8
    high: 18
    critical: 30
  environmentWeights:
    dev: 0
    test: 0
    stage: 5
    prod: 10
  fanout:
    pointsPerWorkload: 2
    maxPoints: 40
  teamSpread:
    pointsPerTeam: 2
    maxPoints: 10
  namespaceSpread:
    pointsPerNamespace: 2
    maxPoints: 10
  unresolvedReferences:
    pointsPerReference: 2
    maxPoints: 10

metrics:
  enabled: true
  edge:
    enabled: true
    includeOwnerTeam: true
    includeResolved: true
  labels:
    includeService: false
    includeEnvironment: true
    maxOwnerTeams: 500
  highCardinality:
    includeSecretKey: false
    includeContainer: false
    includeEnvVar: false
  runtime:
    enabled: true

service:
  type: ClusterIP
  port: 8080
  annotations: {}
  labels: {}

serviceMonitor:
  enabled: false
  labels: {}
  annotations: {}
  interval: 30s
  scrapeTimeout: 10s
  metricRelabelings: []
  relabelings: []

rbac:
  create: true
  scope: cluster
  extraRules: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

dashboards:
  enabled: false
  labels:
    grafana_dashboard: "1"
  annotations: {}

networkPolicy:
  enabled: false
  ingress:
    from: []

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

nodeSelector: {}
tolerations: []
affinity: {}
priorityClassName: ""
podAnnotations: {}
podLabels: {}
extraArgs: []
extraEnv: []
extraVolumes: []
extraVolumeMounts: []
