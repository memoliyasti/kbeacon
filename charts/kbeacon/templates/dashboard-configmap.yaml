{{- if .Values.dashboards.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kbeacon.fullname" . }}-dashboards
  labels:
    {{- include "kbeacon.labels" . | nindent 4 }}
    {{- with .Values.dashboards.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.dashboards.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  kbeacon-cluster-overview.json: |-
{{ .Files.Get "dashboards/kbeacon-cluster-overview.json" | indent 4 }}
  kbeacon-secret-dependency-map.json: |-
{{ .Files.Get "dashboards/kbeacon-secret-dependency-map.json" | indent 4 }}
  kbeacon-dependency-graph-explorer.json: |-
{{ .Files.Get "dashboards/kbeacon-dependency-graph-explorer.json" | indent 4 }}
  kbeacon-team-overview.json: |-
{{ .Files.Get "dashboards/kbeacon-team-overview.json" | indent 4 }}
{{- end }}
